[package]
name = "polygit"
version = "0.1.0"
description = "PQ-signed version control with enterprise governance on scatter-cas"
license = "LicenseRef-PolyQuantum-Commercial"
repository = "https://github.com/polylabs-dev/polygit"

[publisher]
id = "polylabs-dev"
name = "Poly Labs"
signing_key_id = "polylabs-prime-v1"

[escir]
api_version = "0.9.1"
min_platform_version = "0.9.0"

[dependencies]
polykit = ">=0.2.0"

[pricing]
license_type = "per-invocation"
share_price = "0.0004"
private_price = "0.0006"

[telemetry]
schema_hash = "auto"

[telemetry.metrics]
push_operations = "counter"
commit_count = "counter"
repo_creates = "counter"
branch_operations = "counter"
review_submissions = "counter"
merge_operations = "counter"

[telemetry.privacy]
aggregate_window = "1h"
cohort_min_size = 50
noise_budget = "1.0"

[component.include]
circuits = ["circuits/fl/*.fl", "circuits/fl/graphs/*.fl"]
tests = ["test_vectors/*.esz"]
docs = ["docs/*.md"]
